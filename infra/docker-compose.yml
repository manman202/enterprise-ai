# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  aiyedun-internal:   # AI services + backend only — never exposed
    driver: bridge
  aiyedun-web:        # backend ↔ frontends
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  chroma_data:
  ollama_data:
  backup_data:

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aiyedun-postgres
    restart: always
    environment:
      POSTGRES_DB:       aiyedun
      POSTGRES_USER:     aiyedun_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AiyedunDB2026!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backup_data:/backups
    networks:
      - aiyedun-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiyedun_user -d aiyedun"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── ChromaDB ───────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: aiyedun-chromadb
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - aiyedun-internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Ollama ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: aiyedun-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aiyedun-internal
    environment:
      OLLAMA_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-aiyedun/backend}:${BACKEND_TAG:-latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aiyedun-backend
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST:     aiyedun-postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       aiyedun
      POSTGRES_USER:     aiyedun_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AiyedunDB2026!}
      CHROMA_HOST:       aiyedun-chromadb
      CHROMA_PORT:       8000
      OLLAMA_HOST:       aiyedun-ollama
      OLLAMA_PORT:       11434
      OLLAMA_MODEL:      ${OLLAMA_MODEL:-mistral}
    volumes:
      - /opt/aiyedun/uploads:/opt/aiyedun/uploads
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - aiyedun-internal
      - aiyedun-web
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── User Portal (frontend) ─────────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-aiyedun/frontend}:${FRONTEND_TAG:-latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aiyedun-frontend
    restart: always
    networks:
      - aiyedun-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Admin Dashboard ────────────────────────────────────────────────────────
  admin:
    image: ${ADMIN_IMAGE:-aiyedun/admin}:${ADMIN_TAG:-latest}
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: aiyedun-admin
    restart: always
    networks:
      - aiyedun-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
