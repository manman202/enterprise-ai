version: '3.8'

networks:
  aiyedun-internal:
    driver: bridge
  aiyedun-web:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
  ollama_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: aiyedun-postgres
    restart: always
    environment:
      POSTGRES_DB: aiyedun
      POSTGRES_USER: aiyedun_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AiyedunDB2026!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aiyedun-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiyedun_user -d aiyedun"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: aiyedun-chromadb
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - aiyedun-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: aiyedun-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aiyedun-internal
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: ${BACKEND_IMAGE:-aiyedun/backend}:${BACKEND_TAG:-latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aiyedun-backend
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: aiyedun-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: aiyedun
      POSTGRES_USER: aiyedun_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AiyedunDB2026!}
      CHROMA_HOST: aiyedun-chromadb
      CHROMA_PORT: 8000
      OLLAMA_HOST: aiyedun-ollama
      OLLAMA_PORT: 11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    networks:
      - aiyedun-internal
      - aiyedun-web
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:-aiyedun/frontend}:${FRONTEND_TAG:-latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aiyedun-frontend
    restart: always
    networks:
      - aiyedun-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
